<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1b6fd8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuditWise" />
    <meta name="application-name" content="AuditWise" />
    <meta name="description" content="Plateforme d'audit ISO 27001:2022 basée sur l'IA" />

    <!-- PWA Icons -->
    
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <title>AuditWise — Audit ISO 27001:2022</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- PWA Manifest inline pour éviter les erreurs de Content-Type -->
    <script>
      const base = window.location.origin
      const manifestData = {
        name: "AuditWise",
        short_name: "AuditWise",
        description: "Plateforme d'audit ISO 27001:2022",
        start_url: base + "/",
        display: "standalone",
        background_color: "#0b1f45",
        theme_color: "#1b6fd8",
        orientation: "portrait",
        icons: [
          { src: base + "/icon-192.png", sizes: "192x192", type: "image/png" },
          { src: base + "/icon-512.png", sizes: "512x512", type: "image/png" }
        ]
      }
      const blob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' })
      const url  = URL.createObjectURL(blob)
      const link = document.createElement('link')
      link.rel   = 'manifest'
      link.href  = url
      document.head.appendChild(link)
    </script>

    <!-- Enregistrement Service Worker PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ PWA Service Worker enregistré'))
            .catch(err => console.warn('⚠️ Service Worker:', err))
        })
      }
    </script>
  </body>
</html>
